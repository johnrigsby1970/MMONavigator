name: Build WPF Application (MSIX)

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore Dependencies
      run: dotnet restore MMONavigator.sln

    # Build and package the app into an MSIXUpload bundle using full MSBuild
    - name: Build MSIX Package
      run: >
        msbuild MMONavigator.Package/MMONavigator.Package.wapproj
        /p:Configuration=Release
        /p:Platform=x64
        /p:AppxPackageDir="${{ github.workspace }}\Artifacts\MSIX\\"
        /p:AppxBundle=Always
        /p:UapAppxPackageBuildMode=StoreUpload
        /p:AppxPackageSigningEnabled=false
        /p:GenerateAppxPackageOnBuild=true
        /p:HoursBetweenUpdateChecks=0
        /p:AppxPackage=true
        /p:AppxBundlePlatforms=x64
        /v:normal
        /fl "/flp:LogFile=msbuild.log;Verbosity=normal"

    - name: Check for build errors in log
      if: failure()
      run: |
        if (Test-Path "msbuild.log") { Get-Content "msbuild.log" -Tail 100 }

    - name: List Files for Debugging
      run: |
        Get-ChildItem -Recurse "${{ github.workspace }}" -Filter "*.msix*"
        Get-ChildItem -Recurse "${{ github.workspace }}\Artifacts"
        Get-ChildItem -Recurse "${{ github.workspace }}\MMONavigator.Package\AppPackages"

    # Uploads the .msixupload file directly to your GitHub Release assets
    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Artifacts/MSIX/**/*.msixupload
          Artifacts/MSIX/**/*.msix
          Artifacts/MSIX/**/*.msixbundle
          MMONavigator.Package/AppPackages/**/*.msixupload
          MMONavigator.Package/AppPackages/**/*.msix
          MMONavigator.Package/AppPackages/**/*.msixbundle
        name: Release ${{ github.ref_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Keeps internal build log copy in GitHub Actions Artifacts
    - name: Upload Build Artifacts (Internal)
      uses: actions/upload-artifact@v4
      with:
        name: MMONavigator-MSIX
        path: |
          Artifacts/MSIX/
          MMONavigator.Package/AppPackages/
