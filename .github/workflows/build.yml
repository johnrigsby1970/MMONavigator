name: Build WPF Application

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # 👈 Triggers the build whenever you push a tag starting with 'v'
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    # Gives the script permission to upload files back to your release page
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Publish Application
      run: dotnet publish MMONavigator.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:UseAppHost=true

    # NEW STEP: Pins the exact unzipped .exe directly to the release assets
    - name: Upload to GitHub Release
      # This runs if the trigger is a tag push OR if it is a manual release event
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: '**/bin/Release/net8.0-windows/win-x64/publish/MMONavigator.exe'
        name: Release ${{ github.ref_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in token GitHub uses to authorize the upload

    # (Optional) Keeps your internal actions log artifact copy
    - name: Upload Build Artifacts (Internal)
      uses: actions/upload-artifact@v4
      with:
        name: MMONavigator-SelfContained-SingleFile
        path: '**/bin/Release/net8.0-windows/win-x64/publish/MMONavigator.exe'
