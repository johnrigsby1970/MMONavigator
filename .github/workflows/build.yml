name: Build WPF Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # This matches your net8.0 target

    - name: Restore Dependencies
      run: dotnet restore

    # This compiles the app and outputs clean execution files to a specific publish folder
    - name: Publish Application
      run: dotnet publish -c Release -r win-x64 --self-contained false /p:PublishReadyToRun=true

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MMONavigator-Unsigned
        path: '**/bin/Release/net8.0-windows/win-x64/publish/'
