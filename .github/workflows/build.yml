name: Build WPF Application (MSIX)

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Path: MMONavigator.sln                        # Path to your solution
      Wap_Project_Path: MMONavigator.Package/MMONavigator.Package.wapproj    # Path to your WAP project
      Wap_Project_Directory: MMONavigator.Package
      Configuration: Release

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore Project and Packaging Dependencies
      run: |
        msbuild $env:Wap_Project_Path `
          /t:Restore `
          /p:Configuration=$env:Configuration `
          /p:Platform=x64 `
          /p:RuntimeIdentifier=win-x64

        msbuild MMONavigator.csproj `
          /t:Restore `
          /p:Configuration=$env:Configuration `
          /p:Platform=x64 `
          /p:RuntimeIdentifier=win-x64 `
          /p:IntermediateOutputPath="obj/wappublish/win-x64"

    - name: Publish WPF App (Self-Contained)
      run: |
        # Publish self-contained build (bundles .NET runtime + single-file executable)
        dotnet publish MMONavigator.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o "${{ github.workspace }}/publish"

        # Force copy manifest to root of publish directory as AppxManifest.xml
        if (Test-Path "AppxManifest.xml") {
          Copy-Item "AppxManifest.xml" "${{ github.workspace }}/publish/AppxManifest.xml" -Force
        } elseif (Test-Path "Package.appxmanifest") {
          Copy-Item "Package.appxmanifest" "${{ github.workspace }}/publish/AppxManifest.xml" -Force
        }

        # Fix Executable path in AppxManifest.xml for root publish directory
        (Get-Content "${{ github.workspace }}/publish/AppxManifest.xml") -replace 'Executable="MMONavigator\\MMONavigator\.exe"', 'Executable="MMONavigator.exe"' | Set-Content "${{ github.workspace }}/publish/AppxManifest.xml"

        # Copy Assets folder to publish/Assets if present
        if (Test-Path "Assets") {
          Copy-Item "Assets" "${{ github.workspace }}/publish/Assets" -Recurse -Force
        }

    - name: Create Standalone Portable Executable Zip
      run: |
        # Package the self-contained publish folder into a portable zip
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/Artifacts/Portable"
        Compress-Archive -Path "${{ github.workspace }}/publish/*" -DestinationPath "${{ github.workspace }}/Artifacts/Portable/MMONavigator-Portable-win-x64.zip" -Force

    - name: Create Store MSIX & MSIXUpload Package
      run: |
        # Locate MakeAppx tool
        $makeAppx = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Where-Object FullName -like "*x64*" | Select-Object -First 1).FullName

        $msixDir = "${{ github.workspace }}/Artifacts/MSIX"
        $publishDir = "${{ github.workspace }}/publish"
        $msixPath = "$msixDir/MMONavigator.msix"
        $msixUploadPath = "$msixDir/MMONavigator.msixupload"

        New-Item -ItemType Directory -Force -Path $msixDir

        # Pack into MSIX
        & $makeAppx pack /d $publishDir /p $msixPath /o

        # Create .msixupload container with symbol files
        $stagingDir = "${{ github.workspace }}/upload_staging"
        New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
        Copy-Item $msixPath "$stagingDir/MMONavigator.msix"
        Get-ChildItem -Path $publishDir -Filter "*.pdb" | Copy-Item -Destination $stagingDir

        Compress-Archive -Path "$stagingDir/*" -DestinationPath $msixUploadPath -Force
        Remove-Item $stagingDir -Recurse -Force

    - name: Upload Store MSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Store-MSIXUpload
        path: ${{ github.workspace }}/Artifacts/MSIX/*

    - name: Upload Standalone Portable Zip
      uses: actions/upload-artifact@v4
      with:
        name: Standalone-Portable-Exe
        path: ${{ github.workspace }}/Artifacts/Portable/*

    - name: Check for build errors in log
      if: failure()
      run: |
        if (Test-Path "msbuild.log") { Get-Content "msbuild.log" -Tail 100 }

    - name: List Files for Debugging
      run: |
        Write-Host "Checking for msbuild.log..."
        if (Test-Path "msbuild.log") {
            Write-Host "Found msbuild.log. Content:"
            Get-Content "msbuild.log" -Tail 200
        } else {
            Write-Host "msbuild.log not found."
        }
        Write-Host "Searching for MSIX files..."
        Get-ChildItem -Recurse "${{ github.workspace }}" -Filter "*.msix*"
        Get-ChildItem -Recurse "${{ github.workspace }}" -Filter "*.msixupload"
        Get-ChildItem -Recurse "${{ github.workspace }}" -Filter "*.msixbundle"
        Get-ChildItem -Recurse "${{ github.workspace }}" -Filter "*.appx*"
        Write-Host "Checking Artifacts directory..."
        if (Test-Path "${{ github.workspace }}\Artifacts") {
            Get-ChildItem -Recurse "${{ github.workspace }}\Artifacts"
        }
        Write-Host "Checking AppPackages directory..."
        if (Test-Path "${{ github.workspace }}\MMONavigator.Package\AppPackages") {
            Get-ChildItem -Recurse "${{ github.workspace }}\MMONavigator.Package\AppPackages"
        }
        Write-Host "Checking MMONavigator.Package obj and bin..."
        if (Test-Path "${{ github.workspace }}\MMONavigator.Package\obj") {
            Get-ChildItem -Recurse "${{ github.workspace }}\MMONavigator.Package\obj"
        }
        if (Test-Path "${{ github.workspace }}\MMONavigator.Package\bin") {
            Get-ChildItem -Recurse "${{ github.workspace }}\MMONavigator.Package\bin"
        }

    # Uploads both the MSIX store files and the Standalone Portable ZIP to GitHub Releases
    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Artifacts/Portable/**/*.zip
          Artifacts/MSIX/**/*.msixupload
          Artifacts/MSIX/**/*.msix
          Artifacts/MSIX/**/*.msixbundle
          **/AppPackages/**/*.msix
          **/AppPackages/**/*.msixbundle
          MMONavigator.Package/AppPackages/**/*.msixupload
          MMONavigator.Package/AppPackages/**/*.msix
          MMONavigator.Package/AppPackages/**/*.msixbundle
        name: Release ${{ github.ref_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Keeps internal build log copy in GitHub Actions Artifacts
    - name: Upload Build Artifacts (Internal)
      uses: actions/upload-artifact@v4
      with:
        name: MMONavigator-MSIX
        path: |
          Artifacts/MSIX/
          MMONavigator.Package/AppPackages/
